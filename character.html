<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐릭터 갤러리</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/character.css" />
</head>
<body>

  <header class="page-header">
    <h1 class="page-title">캐릭터 갤러리</h1>

    <div class="auth-area">
      <span id="ownerBadge" class="owner-badge" hidden>주인 모드 ✏️</span>
      <button id="loginToggleBtn" type="button" class="auth-btn">주인 로그인</button>
      <button id="logoutBtn" type="button" class="auth-btn" hidden>로그아웃</button>

      <div id="loginPanel" class="login-panel" hidden>
        <input type="email" id="emailInput" class="login-input" placeholder="이메일" autocomplete="username" />
        <input type="password" id="passwordInput" class="login-input" placeholder="비밀번호" autocomplete="current-password" />
        <p id="loginError" class="login-error" hidden></p>
        <div class="login-actions">
          <button id="loginCancelBtn" type="button" class="btn-cancel">취소</button>
          <button id="loginSubmitBtn" type="button" class="btn-save">로그인</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- 카드 8개는 js/character.js 에서 자동으로 그려줌 -->
    <div id="gallery" class="gallery"></div>
  </main>

  <!-- 주인 전용 편집 모달 -->
  <div id="editModal" class="modal-overlay" hidden>
    <div class="modal-box">
      <h2 class="modal-title">카드 편집</h2>

      <div class="modal-preview">
        <img id="previewImg" src="" alt="미리보기" hidden />
        <div id="previewPlaceholder" class="preview-placeholder">＋</div>
      </div>

      <label class="file-label" for="fileInput">사진 선택</label>
      <input type="file" id="fileInput" accept="image/*" hidden />

      <input type="text" id="nameInput" class="name-input" placeholder="이름을 입력해줘" maxlength="20" />

      <p id="modalError" class="modal-error" hidden></p>

      <div class="modal-actions">
        <button id="removePhotoBtn" type="button" class="btn-text">사진 삭제</button>
        <div class="modal-actions-right">
          <button id="cancelBtn" type="button" class="btn-cancel">취소</button>
          <button id="saveBtn" type="button" class="btn-save">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/character.js"></script>
</body>
</html>

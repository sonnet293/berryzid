<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글쓰기</title>
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
  <link rel="stylesheet" href="css/write.css" />
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <div class="logo">my<span>blog</span></div>
    <div class="header-actions">
      <button class="btn btn-danger" id="logout-btn" style="display:none;">로그아웃</button>
    </div>
  </header>

  <!-- ── 로그인 섹션 ── -->
  <section id="login-section">
    <div class="login-card">
      <h2>글쓰기</h2>
      <p class="subtitle">블로그 관리자만 접근할 수 있어요.</p>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p class="login-error" id="login-error"></p>
      <button class="btn btn-primary" id="login-btn">로그인</button>
    </div>
  </section>

  <!-- ── 에디터 섹션 ── -->
  <section id="editor-section" style="display:none;">
    <div class="editor-header">
      <h1>새 글 작성</h1>
      <p>작성한 글은 Firestore에 저장되고, 이미지는 Supabase Storage에 업로드돼요.</p>
    </div>

    <!-- 제목 -->
    <input type="text" id="post-title" placeholder="제목을 입력하세요" />

    <!-- Quill 에디터 -->
    <div class="editor-wrapper">
      <div id="toolbar">
        <span class="ql-formats">
          <select class="ql-font" id="font-select">
            <option selected>기본</option>
            <option value="pretendard">Pretendard</option>
            <option value="serif">Serif</option>
            <option value="monospace">Mono</option>
          </select>
          <button class="toolbar-custom-btn" id="add-font-btn" title="폰트 추가">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </span>
        <span class="ql-formats">
          <select class="ql-size">
            <option value="12px">12</option>
            <option value="14px">14</option>
            <option value="16px" selected>16</option>
            <option value="18px">18</option>
            <option value="20px">20</option>
            <option value="24px">24</option>
            <option value="28px">28</option>
            <option value="32px">32</option>
            <option value="36px">36</option>
            <option value="48px">48</option>
          </select>
        </span>
        <span class="ql-formats">
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>
          <button class="ql-strike"></button>
        </span>
        <span class="ql-formats">
          <button class="toolbar-custom-btn color-btn" id="text-color-btn" title="글자 색">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <text x="2" y="12" font-size="11" font-weight="700" font-family="serif" fill="currentColor">A</text>
              <rect x="1" y="13" width="14" height="2.5" rx="1" id="text-color-indicator" fill="#000000"/>
            </svg>
          </button>
          <button class="toolbar-custom-btn color-btn" id="bg-color-btn" title="배경 색">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="2" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/>
              <rect x="1" y="13" width="14" height="2.5" rx="1" id="bg-color-indicator" fill="#ffff00"/>
            </svg>
          </button>
        </span>
        <span class="ql-formats">
          <button class="ql-align" value=""></button>
          <button class="ql-align" value="center"></button>
          <button class="ql-align" value="right"></button>
          <button class="ql-align" value="justify"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-list" value="ordered"></button>
          <button class="ql-list" value="bullet"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-link"></button>
          <button class="ql-image"></button>
          <button class="ql-blockquote"></button>
          <button class="ql-code-block"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-clean"></button>
        </span>
      </div>
      <div id="editor"></div>
    </div>

    <!-- 썸네일 + 비밀글 옵션 -->
    <div class="post-options">
      <!-- 썸네일 -->
      <div class="option-block">
        <div class="option-label">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="2" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1 9l3.5-3.5L7 8l2.5-2.5L14 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          썸네일
        </div>
        <div class="thumbnail-upload-area" id="thumbnail-area">
          <input type="file" id="thumbnail-input" accept="image/*" style="display:none;" />
          <div class="thumbnail-placeholder" id="thumbnail-placeholder">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="3" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 13l5-4 4 4 3-3 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>클릭해서 썸네일 이미지 선택</span>
          </div>
          <img id="thumbnail-preview" src="" alt="썸네일 미리보기" style="display:none;" />
          <button class="thumbnail-remove" id="thumbnail-remove" style="display:none;" title="제거">✕</button>
        </div>
      </div>

      <!-- 비밀글 -->
      <div class="option-block">
        <div class="option-label">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="4" y="6" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 6V4.5a2.5 2.5 0 015 0V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          비밀글
        </div>
        <div class="secret-row">
          <label class="toggle-switch">
            <input type="checkbox" id="secret-toggle" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <span class="secret-label" id="secret-label">공개</span>
        </div>
        <div class="secret-pw-wrap" id="secret-pw-wrap" style="display:none;">
          <input type="password" id="secret-password" placeholder="비밀번호 설정 (4자리 이상)" class="secret-pw-input" maxlength="30" />
        </div>
      </div>
    </div>

    <!-- 하단 버튼 -->
    <div class="editor-actions">
      <button class="btn btn-ghost" id="reset-btn">초기화</button>
      <button class="btn btn-primary btn-lg" id="submit-btn">게시하기</button>
    </div>
  </section>

  <!-- ── 크롭 모달 ── -->
  <div id="crop-modal">
    <div class="crop-box">
      <div class="crop-box-header">
        <h3>이미지 자르기</h3>
        <button class="btn btn-ghost" id="crop-cancel" style="padding:6px 12px;">✕</button>
      </div>
      <div class="crop-image-wrap">
        <img id="crop-image" src="" alt="crop target" />
      </div>
      <div class="crop-box-footer">
        <button class="btn btn-ghost" id="crop-cancel-2">취소</button>
        <button class="btn btn-primary" id="crop-confirm">적용</button>
      </div>
    </div>
  </div>

  <!-- ── 색상 패널 ── -->
  <div id="color-panel" class="color-panel">
    <div class="color-panel-header">
      <span id="color-panel-title">글자 색</span>
      <button class="color-panel-close" id="color-panel-close">✕</button>
    </div>
    <div class="color-presets" id="color-presets"></div>
    <div class="color-divider"></div>
    <div class="rgb-sliders">
      <div class="slider-row">
        <label>R</label>
        <input type="range" id="slider-r" min="0" max="255" value="0" />
        <input type="number" id="num-r" min="0" max="255" value="0" class="num-input" />
      </div>
      <div class="slider-row">
        <label>G</label>
        <input type="range" id="slider-g" min="0" max="255" value="0" />
        <input type="number" id="num-g" min="0" max="255" value="0" class="num-input" />
      </div>
      <div class="slider-row">
        <label>B</label>
        <input type="range" id="slider-b" min="0" max="255" value="0" />
        <input type="number" id="num-b" min="0" max="255" value="0" class="num-input" />
      </div>
    </div>
    <div class="color-bottom">
      <div class="color-preview-wrap">
        <div class="color-preview" id="color-preview"></div>
      </div>
      <div class="hex-wrap">
        <span class="hex-hash">#</span>
        <input type="text" id="hex-input" maxlength="6" placeholder="000000" class="hex-input" />
      </div>
      <button class="btn btn-primary" id="color-apply-btn" style="padding:8px 16px; font-size:0.85rem;">적용</button>
    </div>
  </div>

  <!-- ── 폰트 추가 모달 ── -->
  <div id="font-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3>폰트 추가</h3>
        <button class="btn btn-ghost" id="font-modal-close" style="padding:6px 12px;">✕</button>
      </div>

      <!-- 탭 -->
      <div class="font-tabs">
        <button class="font-tab active" data-tab="google">Google Fonts</button>
        <button class="font-tab" data-tab="webfont">웹폰트 직접 입력</button>
      </div>

      <!-- Google Fonts 탭 -->
      <div class="modal-body" id="font-tab-google">
        <div class="form-group" style="margin-bottom:14px;">
          <label>폰트 이름 <span style="font-weight:400; text-transform:none;">(툴바에 표시될 이름)</span></label>
          <input type="text" id="font-label-input" placeholder="예: Noto Sans KR" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>@import URL</label>
          <input type="text" id="font-url-input" placeholder="예: https://fonts.googleapis.com/css2?family=Noto+Sans+KR" />
        </div>
        <p class="font-hint">💡 Google Fonts → 폰트 선택 → "Get embed code" → @import 탭의 URL 부분만 복사</p>
      </div>

      <!-- 웹폰트 직접 입력 탭 -->
      <div class="modal-body" id="font-tab-webfont" style="display:none;">
        <div class="form-group" style="margin-bottom:14px;">
          <label>폰트 이름 <span style="font-weight:400; text-transform:none;">(툴바에 표시될 이름)</span></label>
          <input type="text" id="font-label-webfont" placeholder="예: 나눔손글씨 행복체" />
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>@font-face CSS 코드</label>
          <textarea
            id="font-face-input"
            class="font-face-textarea"
            placeholder="@font-face {&#10;  font-family: '폰트이름';&#10;  src: url('https://...') format('woff2');&#10;}"
            rows="5"
          ></textarea>
        </div>
        <p class="font-hint">💡 눈누 등에서 "웹폰트로 사용" 클릭 → @font-face 코드 전체 복붙</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="font-modal-cancel">취소</button>
        <button class="btn btn-primary" id="font-modal-confirm">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 토스트 ── -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

  <script type="module">
    import "./js/write.js";
    import { auth, OWNER_UID } from "./js/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const logoutBtn = document.getElementById("logout-btn");
    onAuthStateChanged(auth, (user) => {
      logoutBtn.style.display = (user && user.uid === OWNER_UID) ? "inline-flex" : "none";
    });
    document.getElementById("crop-cancel-2").addEventListener("click", () => {
      document.getElementById("crop-cancel").click();
    });
  </script>
</body>
</html>
